name: Bug Report
description: Báo cáo lỗi
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Cảm ơn bạn đã báo cáo lỗi!

  - type: textarea
    id: description
    attributes:
      label: Mô tả lỗi
      description: Mô tả rõ ràng lỗi bạn gặp phải
      placeholder: Khi tôi làm X thì xảy ra Y...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Các bước tái hiện lỗi
      description: Các bước để reproduce lỗi
      placeholder: |
        1. Vào trang '...'
        2. Click vào '...'
        3. Scroll xuống '...'
        4. Thấy lỗi
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Kết quả mong đợi
      description: Bạn mong đợi điều gì xảy ra?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Kết quả thực tế
      description: Điều gì thực sự xảy ra?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Thêm ảnh chụp màn hình nếu có
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Thông tin thêm
      description: Bất kỳ thông tin nào khác
    validations:
      required: false
