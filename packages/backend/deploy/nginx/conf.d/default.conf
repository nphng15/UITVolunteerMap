# Upstream Express backend (Docker service name from docker-compose)
upstream backend_upstream {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Basic security headers (helmet trên backend đã set, nginx bổ sung lớp ngoài)
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # Healthcheck shortcut (không log để khỏi nhiễu access.log)
    location = /healthz {
        access_log off;
        proxy_pass http://backend_upstream/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Reverse proxy mọi request về Express
    location / {
        proxy_pass http://backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forward headers chuẩn để Express biết client thật
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts cho upload/long request
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering
        proxy_buffering on;
        proxy_buffers   16 16k;
        proxy_buffer_size 32k;
    }
}
