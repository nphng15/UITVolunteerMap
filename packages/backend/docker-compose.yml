services:
  backend:
    build:
      context: ../..
      dockerfile: packages/backend/Dockerfile
    image: ${DOCKER_USERNAME:-nphng15}/uit-volunteer-map-backend:${TAG:-latest}
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2h}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  backend_data:
